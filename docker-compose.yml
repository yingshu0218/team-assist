version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-crm-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:?Set ADMIN_SESSION_SECRET before starting the stack}
    volumes:
      - /opt/teamassist:/app/data
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: ledger-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
