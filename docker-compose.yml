version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-crm-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:?Set ADMIN_SESSION_SECRET before starting the stack}
    volumes:
      - /opt/teamassist:/app/data
